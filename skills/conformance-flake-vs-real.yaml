id: conformance-flake-vs-real
name: Conformance test failure (flake vs real bug)
description: |
  Conformance suite reports one or more failed specs. Most CAPZ
  conformance reds are infra flakes (load-balancer eventual
  consistency, slow image pulls) but real bugs hide here too.
  Disambiguation is mechanical: check if the same spec failed in
  recent builds and check the test's own logs.

priority: 90

triggers:
  - "(?i)conformance.*(fail|FAIL)"
  - "(?i)\\[(Conformance|sig-)"
  - "(?i)e2e.*conformance"

required_evidence:
  - id: junit-xml
    description: Conformance suite junit output
    any_of:
      - "artifacts/.*/junit.*\\.xml"
      - ".*conformance.*junit.*\\.xml"
  - id: e2e-namespace-events
    description: Workload-cluster test namespace events or pod logs
    any_of:
      - "artifacts/clusters/.*/(e2e|conformance|sonobuoy).*/.*"

procedure: |
  1. Read the junit XML to enumerate failing test names + the
     captured failure message for each. Do NOT summarize at the
     "5 tests failed" level — pick a representative failure with
     a non-empty message.
  2. Inspect the failure stack / message. If it contains "timed
     out waiting", check whether the underlying resource appears in
     the workload-cluster events / pod logs.
  3. Compare against well-known CAPZ conformance flake patterns:
     - LoadBalancer service eventual provisioning lag
     - Slow image pull on first scheduling
     - Network policy propagation lag
  4. Conclude EITHER: (a) the failure is a known flake pattern and
     the recommendation is to monitor / re-run, OR (b) it is a real
     bug — name the component + cite the specific log evidence.
     Do not punt to "investigate the failing tests".
