# Project config for the CAPZ Prow dashboard (Qwen/Dynamo demo).
#
# Mirrors willie-yao/capz-prow-ai-dashboard exactly EXCEPT for the AI
# endpoint and runtime: this dashboard's analyses are produced by an
# in-cluster Qwen3-Coder-480B-A35B-FP8 model served via NVIDIA Dynamo
# (trtllm backend) on the demo AKS cluster, reached over cluster-internal
# DNS from a self-hosted GitHub Actions runner. Same prow jobs, same
# prompt — different model + endpoint. Lets the team
# compare summary quality side-by-side at:
#
#   prod (Claude):     https://willie-yao.github.io/capz-prow-ai-dashboard/
#   demo (Qwen):       https://willie-yao.github.io/capz-prow-ai-dashboard-qwen/

id: capz-qwen
name: "Cluster API Provider Azure (Qwen demo)"
short_name: "CAPZ-Qwen"

# Only jobs that advertise this testgrid dashboard are included. Job
# discovery is automatic: the engine asks GitHub code search for every
# YAML under kubernetes/test-infra/config/jobs/ that mentions this
# dashboard, then keeps the jobs whose testgrid-dashboards annotation
# contains it.
testgrid:
  dashboard: "sig-cluster-lifecycle-cluster-api-provider-azure"

# Same category rules as the prod CAPZ dashboard so a side-by-side
# comparison is apples-to-apples.
categories:
  - match: "conformance"
    id: "conformance"
    label: "Conformance"
  - match: "[managed kubernetes]"
    id: "aks-e2e"
    label: "AKS E2E"
  - match: "e2e-aks"
    id: "aks-e2e"
    label: "AKS E2E"
  - match: "capi-e2e"
    id: "capi-e2e"
    label: "CAPI E2E"
  - match: "upgrade"
    id: "upgrade"
    label: "Upgrade"
  - match: "coverage"
    id: "coverage"
    label: "Coverage"
  - match: "scalability"
    id: "scalability"
    label: "Scalability"
  - match: "e2e"
    id: "capz-e2e"
    label: "CAPZ E2E"

category_display_order:
  - capz-e2e
  - aks-e2e
  - upgrade
  - capi-e2e
  - conformance
  - coverage
  - scalability

# GCS bucket holding build artifacts.
gcs:
  bucket: "kubernetes-ci-logs"

# UI branding. The "(Qwen demo)" suffix in the title makes it obvious
# at a glance which dashboard the viewer is on.
branding:
  title: "CAPZ Prow Dashboard (Qwen demo)"
  base_path: "/capz-prow-ai-dashboard-qwen"
  site_url: "https://willie-yao.github.io/capz-prow-ai-dashboard-qwen"
  source_repo:
    owner: "kubernetes-sigs"
    name: "cluster-api-provider-azure"

# AI analysis settings.
#
# Endpoint and model come from repo variables wired in
# .github/workflows/deploy.yml. For this demo, set:
#
#   gh variable set AI_ENDPOINT \
#     -b "http://qwen-coder-480b-r1-frontend.default.svc:8000/v1/chat/completions"
#   gh variable set AI_MODEL -b "Qwen/Qwen3-Coder-480B-A35B-Instruct-FP8"
#
# AI_ENDPOINT uses cluster-internal DNS because the GHA runner is the
# in-cluster ARC runner labelled `arc-qwen-runner` (see deploy.yml).
# The Dynamo frontend doesn't require an API key, but the engine
# expects AI_TOKEN to be non-empty — any string works.
ai:
  # Phase L universal agentic path. Same as the prod CAPZ dashboard so
  # the only intentional variable between the two deployments is the
  # endpoint + model.
  use_universal_path: true

  # Analyze several failures in parallel. The in-cluster Qwen3-Coder-480B
  # Dynamo endpoint is dedicated to this dashboard and batches concurrent
  # requests, so 4 cuts a cold-cache fetch's wall clock ~4x without
  # saturating it. Safe here because the endpoint is not a shared/rate-
  # limited provider. See prow-ai-dashboard/docs/agentic.md (ai.concurrency).
  concurrency: 4

  agentic:
    enabled: true
    always: false
    # Qwen3-Coder-480B-A35B-FP8 on Dynamo (trtllm) has a 262144-token
    # context window, so the tight budgets the 235B/40960 deployment
    # needed no longer apply. Give the model room to read deep logs.
    #
    # Bumped 20 -> 30: the 2026-06-11 builds=4 run showed ~70% of analyses
    # hit the 20-iteration cap while using only ~25% of the context window,
    # i.e. they were iteration-bound, not context-bound. 30 lets the
    # heavy-tail investigations keep drilling; peak context still stays well
    # under the window. Applies to future/uncached analyses.
    max_iters: 30
    # Bytes of tool-call output the model accumulates across the loop.
    # 500K bytes is ~140K tokens, leaving ~120K of the 256K window for
    # the prompt, schema, artifact-tree seed, reasoning, and response.
    model_byte_budget: 500000
    # Compaction safety net: only stubs oldest tool results if a request
    # would exceed this. 800K bytes (~230K tokens) sits just under the
    # window so a long critique-heavy investigation never overflows,
    # while normal runs never trigger it.
    context_byte_budget: 800000
    # Floors: keep the same investigation bar as the 235B config.
    min_tool_calls: 5
    min_gcs_bytes: 500000
    # Seed the build's full artifact path tree into the prompt so the
    # model reads exact paths instead of guessing leaf filenames. Safe
    # here because the 256K window easily holds the ~150-path list.
    seed_artifact_tree: true
    # On a critique retry, fetch the artifacts the draft cited but never
    # read and inject their content into the feedback. Requires critique.
    evidence_injection: true
    # NOTE: single_tool_call is intentionally NOT set. Unlike the stock
    # Llama 3.1 template, Qwen3-Coder emits parallel tool calls cleanly,
    # so the client-side cap would only slow investigation down.
    critique:
      enabled: true
      max_retries: 2
    skills:
      enabled: true
    tools:
      - filesystem
      - k8s
